<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fund Ledger{% endblock %}</title>
  <script>
    (() => {
      const key = "fund-ledger-theme";
      let theme = "";
      try { theme = localStorage.getItem(key) || ""; } catch {}
      if (!theme) theme = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css?v=20260613-eaccount-mobile">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-main">
        <a class="brand" href="/">Fund Ledger</a>
        <button class="icon-btn theme-toggle" type="button" data-theme-toggle title="切换暗色模式" aria-label="切换暗色模式">
          <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7 7 0 1 0 11.6 11.6Z"/></svg>
          <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
      <nav class="nav">
        <a href="/upload">上传</a>
        <a href="/imports">导入</a>
        <a href="/candidates">候选</a>
        <a href="/transactions">流水</a>
        <a href="/events">事件</a>
        <a href="/holdings">持仓</a>
        <a href="/charts">曲线</a>
        <a href="/eaccount">对账</a>
        <a href="/funds">基金</a>
        <a href="/settings">设置</a>
        <form method="post" action="/logout"><button type="submit">退出</button></form>
      </nav>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    (() => {
      const key = "fund-ledger-theme";
      const toggle = document.querySelector("[data-theme-toggle]");
      const setTheme = (theme) => {
        document.documentElement.dataset.theme = theme;
        toggle?.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
        try { localStorage.setItem(key, theme); } catch {}
      };
      setTheme(document.documentElement.dataset.theme || "light");
      toggle?.addEventListener("click", () => setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));
    })();
  </script>
</body>
</html>
