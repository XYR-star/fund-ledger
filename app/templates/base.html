<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fund Ledger{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script>
    const savedTheme = localStorage.getItem("fund-ledger-theme");
    if (savedTheme) document.documentElement.dataset.theme = savedTheme;
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/">Fund Ledger</a>
      <nav class="nav">
        <a href="/">仪表盘</a>
        <a href="/upload">上传</a>
        <a href="/imports">导入</a>
        <a href="/candidates">候选</a>
        <a href="/transactions">流水</a>
        <a href="/holdings">持仓</a>
        <a href="/nav">净值</a>
        <a href="/fund-rules">规则</a>
        <a href="/settings">设置</a>
        <a href="/backup">备份</a>
        <button class="icon-btn" type="button" data-theme-toggle title="切换暗色模式" aria-label="切换暗色模式">
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7 7 0 1 0 11.6 11.6Z"/></svg>
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <form method="post" action="/logout"><button type="submit">退出</button></form>
      </nav>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    const toggle = document.querySelector("[data-theme-toggle]");
    const setTheme = (theme) => {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem("fund-ledger-theme", theme);
    };
    toggle?.addEventListener("click", () => {
      setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
    });
  </script>
</body>
</html>
