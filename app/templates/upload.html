{% extends "base.html" %}
{% block title %}上传 - Fund Ledger{% endblock %}
{% block content %}
<div class="page-title">
  <div>
    <h1>上传交易记录</h1>
    <p class="muted">支持批量上传截图或 PDF；上传后会自动排队 OCR、解析和同步相关数据。</p>
  </div>
</div>

<section class="panel stack">
  <form class="stack" method="post" action="/upload" enctype="multipart/form-data">
    <label>截图 / PDF 附件
      <input type="file" name="files" accept="image/*,.pdf" multiple>
    </label>
    <label>交易文本
      <textarea name="raw_text" placeholder="2024-01-02 161725 招商中证白酒 buy 1000 - 1.2345 1.00"></textarea>
    </label>
    <p class="sample">可一次选择多个文件。文本框适合临时粘贴交易文本；上传后系统会自动进入导入队列，字段缺失或识别失败会在导入详情里显示错误。</p>
    <div class="actions">
      <button class="btn primary" type="submit">上传并自动导入</button>
      <a class="btn" href="/candidates">查看候选</a>
    </div>
  </form>
</section>
{% endblock %}
