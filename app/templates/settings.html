{% extends "base.html" %}
{% block title %}设置 - Fund Ledger{% endblock %}
{% block content %}
<div class="page-title"><div><h1>设置</h1><p class="muted">OCR 后端固定为百度表格 OCR。</p></div></div>
{% if message %}<section class="panel">{{ message }}</section>{% endif %}
<section class="panel stack">
  <form class="stack" method="post" action="/settings">
    <label><span><input type="checkbox" name="ocr_enabled" {% if config.OCR_ENABLED in [true, "true", "True", "1"] %}checked{% endif %} style="width:auto"> 启用 OCR</span></label>
    <label>百度 API Key<input name="baidu_ocr_api_key" placeholder="{{ masked(config.BAIDU_OCR_API_KEY) }}"></label>
    <label>百度 Secret Key<input name="baidu_ocr_secret_key" placeholder="{{ masked(config.BAIDU_OCR_SECRET_KEY) }}"></label>
    <label>表格 OCR Endpoint<input name="baidu_table_ocr_endpoint" value="{{ config.BAIDU_TABLE_OCR_ENDPOINT }}"></label>
    <button class="btn primary" type="submit">保存</button>
  </form>
</section>
{% endblock %}
